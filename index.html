<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayurveda AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
  body {
    background: radial-gradient(circle at center, #0f2d1f, #07150f);
    font-family: 'Inter', sans-serif;
    color: #e8f5e9;
  }

  .title {
    font-family: 'Playfair Display', serif;
  }

  .chat-scroll::-webkit-scrollbar {
    width: 6px;
  }
  .chat-scroll::-webkit-scrollbar-thumb {
    background: #2e7d32;
    border-radius: 10px;
  }

  .leaf {
    position: absolute;
    opacity: 0.08;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-20px);}
  }
</style>
</head>

<body class="h-screen flex flex-col">

<!-- 🌿 Header -->
<header class="p-4 border-b border-green-800 flex justify-between items-center">
  <h1 class="title text-2xl text-green-300">Ayurveda AI</h1>
  <span class="text-sm opacity-60">Charaka Samhita Assistant</span>
</header>

<!-- 🌿 Chat Area -->
<div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll">

  <!-- Bot Message -->
  <div class="flex">
    <div class="bg-green-900 p-3 rounded-xl max-w-lg">
      Ask me anything about Ayurveda...
    </div>
  </div>

</div>

<!-- 🌿 Input -->
<div class="p-4 border-t border-green-800 flex gap-2">
  <input id="input"
    class="flex-1 p-3 rounded-lg bg-[#0d2218] border border-green-700 outline-none"
    placeholder="Ask about Rasayana, Chyawanprash..."
  />
  <button onclick="sendMessage()"
    class="bg-green-700 px-5 rounded-lg hover:bg-green-600 transition">
    Send
  </button>
</div>

<!-- 🌿 Floating Leaves -->
<div class="leaf top-10 left-10 text-6xl">🍃</div>
<div class="leaf bottom-20 right-10 text-5xl">🌿</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value.trim();
  if (!question) return;

  // user message
  chat.innerHTML += `
    <div class="flex justify-end">
      <div class="bg-green-700 p-3 rounded-xl max-w-lg">
        ${question}
      </div>
    </div>
  `;

  input.value = "";

  // loading
  chat.innerHTML += `
    <div id="loading" class="flex">
      <div class="bg-green-900 p-3 rounded-xl">Thinking...</div>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("http://127.0.0.1:8000/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question })
    });

    const data = await res.json();

    document.getElementById("loading").remove();

    chat.innerHTML += `
      <div class="flex">
        <div class="bg-green-900 p-3 rounded-xl max-w-lg">
          ${data.answer}
        </div>
      </div>
    `;

  } catch (err) {
    document.getElementById("loading").remove();

    chat.innerHTML += `
      <div class="text-red-400">Error connecting to server</div>
    `;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
